<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indian Diet Planner</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #f5f5f0; color: #222; }
header { background: #2d6a4f; color: white; padding: 1.5rem 2rem; }
header h1 { font-size: 1.6rem; font-weight: 600; }
header p { font-size: 0.9rem; opacity: 0.8; margin-top: 4px; }
.container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
.card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid #e0e0d8; }
.card h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; color: #2d6a4f; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
input, select { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
.toggle-row { display: flex; gap: 10px; margin-top: 4px; }
.toggle-btn { flex: 1; padding: 10px; border: 1.5px solid #ddd; border-radius: 8px; background: white; cursor: pointer; font-size: 13px; font-weight: 500; color: #444; transition: all .15s; }
.toggle-btn.active-veg { border-color: #2d6a4f; background: #d8f3dc; color: #2d6a4f; }
.toggle-btn.active-nonveg { border-color: #b5451b; background: #fde8e0; color: #b5451b; }
.toggle-btn.active-goal { border-color: #2d6a4f; background: #d8f3dc; color: #2d6a4f; }
.btn-calc { width: 100%; padding: 12px; background: #2d6a4f; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 1rem; }
.btn-calc:hover { background: #1b4332; }
.btn-calc:disabled { background: #888; cursor: not-allowed; }
.targets { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
.target-box { text-align: center; padding: 1rem; border-radius: 10px; background: #f0faf4; border: 1px solid #b7e4c7; }
.target-box .val { font-size: 1.6rem; font-weight: 700; color: #1b4332; }
.target-box .lbl { font-size: 12px; color: #555; margin-top: 2px; }
.day-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.2rem; }
.day-tab { padding: 6px 14px; border-radius: 20px; border: 1.5px solid #ddd; background: white; cursor: pointer; font-size: 13px; font-weight: 500; color: #555; transition: all .15s; }
.day-tab.active { background: #2d6a4f; color: white; border-color: #2d6a4f; }
.meal-section { margin-bottom: 1.1rem; }
.meal-header { display: flex; justify-content: space-between; align-items: center; padding: .6rem .9rem; border-radius: 8px 8px 0 0; font-weight: 600; font-size: 14px; }
.meal-body { border: 1px solid #e8e8e0; border-top: none; border-radius: 0 0 8px 8px; }
.meal-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 7px 12px; border-bottom: 1px solid #f0f0ec; color: #333; gap: 8px; }
.meal-row:last-child { border-bottom: none; }
.meal-row .food-name { flex: 1; }
.meal-row .macro { color: #888; font-size: 12px; white-space: nowrap; }
.swap-btn { font-size: 11px; padding: 2px 8px; border-radius: 20px; border: 1px solid #2d6a4f; color: #2d6a4f; background: white; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
.swap-btn:hover { background: #d8f3dc; }
.swap-btn:disabled { border-color: #aaa; color: #aaa; cursor: not-allowed; }
.swap-result { font-size: 12px; color: #1b4332; background: #d8f3dc; border-radius: 6px; padding: 4px 10px; margin: 0 12px 6px; border-left: 3px solid #2d6a4f; }
.day-total { display: flex; justify-content: center; gap: 2rem; padding: .9rem; background: #f8faf8; border-radius: 10px; border: 1px solid #d0eada; margin-top: .5rem; }
.day-total span { font-size: 14px; font-weight: 600; color: #1b4332; }
.day-total small { font-size: 12px; color: #666; font-weight: 400; }
#results { display: none; }
.badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; margin-left: 6px; vertical-align: middle; }
.badge-veg { background: #d8f3dc; color: #2d6a4f; }
.badge-nonveg { background: #fde8e0; color: #b5451b; }
.loading-box { text-align: center; padding: 2rem; color: #555; }
.spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid #d8f3dc; border-top-color: #2d6a4f; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
@keyframes spin { to { transform: rotate(360deg); } }
.ai-badge { display: inline-block; font-size: 11px; background: #e8f4fd; color: #1565c0; border: 1px solid #90caf9; border-radius: 20px; padding: 2px 8px; margin-left: 8px; vertical-align: middle; }
.error-box { background: #fde8e0; border: 1px solid #f5c6b0; border-radius: 8px; padding: 1rem; color: #b5451b; font-size: 14px; margin-top: 1rem; }
</style>
</head>
<body>
<header>
  <h1>Indian Diet Planner <span style="font-size:13px;opacity:0.8;font-weight:400">powered by Groq AI</span></h1>
  <p>AI-generated personalized 7-day Indian meal plans with smart swap suggestions</p>
</header>
<div class="container">
  <div class="card">
    <h2>Client Details</h2>
    <div class="grid">
      <div><label>Age (years)</label><input type="number" id="age" placeholder="25" min="15" max="80"></div>
      <div><label>Gender</label><select id="gender"><option value="male">Male</option><option value="female">Female</option></select></div>
      <div><label>Weight (kg)</label><input type="number" id="weight" placeholder="70" min="30" max="200"></div>
      <div><label>Height (cm)</label><input type="number" id="height" placeholder="175" min="100" max="250"></div>
    </div>
    <div style="margin-top:1rem">
      <label>Activity Level</label>
      <select id="activity">
        <option value="1.2">Sedentary (desk job, no gym)</option>
        <option value="1.375">Lightly active (gym 1-3x/week)</option>
        <option value="1.55" selected>Moderately active (gym 4-5x/week)</option>
        <option value="1.725">Very active (hard training daily)</option>
      </select>
    </div>
    <div style="margin-top:1rem">
      <label>Diet Type</label>
      <div class="toggle-row" id="diet-row">
        <button class="toggle-btn active-veg" onclick="setDiet(this,'veg')">🥦 Vegetarian</button>
        <button class="toggle-btn" onclick="setDiet(this,'nonveg')">🍗 Non-Vegetarian</button>
      </div>
      <input type="hidden" id="diet" value="veg">
    </div>
    <div style="margin-top:1rem">
      <label>Goal</label>
      <div class="toggle-row" id="goal-row">
        <button class="toggle-btn active-goal" onclick="setGoal(this,'muscle')">💪 Muscle Gain</button>
        <button class="toggle-btn" onclick="setGoal(this,'loss')">🔥 Weight Loss</button>
        <button class="toggle-btn" onclick="setGoal(this,'maintain')">⚖️ Maintain</button>
      </div>
      <input type="hidden" id="goal" value="muscle">
    </div>
    <button class="btn-calc" id="gen-btn" onclick="generatePlan()">✨ Generate AI Diet Plan</button>
  </div>

  <div id="results">
    <div class="card">
      <h2>Daily Targets</h2>
      <div class="targets">
        <div class="target-box"><div class="val" id="t-cal">--</div><div class="lbl">kcal / day</div></div>
        <div class="target-box"><div class="val" id="t-protein">--</div><div class="lbl">g protein / day</div></div>
        <div class="target-box"><div class="val" id="t-bmr">--</div><div class="lbl">BMR (kcal)</div></div>
      </div>
    </div>
    <div class="card">
      <h2 id="plan-title">7-Day Meal Plan</h2>
      <div class="day-tabs" id="day-tabs"></div>
      <div id="meal-plan"></div>
    </div>
  </div>
</div>

<script>
const GROQ_API_KEY = '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';
const GROQ_MODEL = 'llama-3.3-70b-versatile';
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

let selectedGoal = 'muscle';
let selectedDiet = 'veg';
let currentDay = 0;
let generatedPlan = [];
let clientStats = {};

function setDiet(btn, val) {
  document.getElementById('diet-row').querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active-veg','active-nonveg'));
  btn.classList.add(val === 'veg' ? 'active-veg' : 'active-nonveg');
  selectedDiet = val;
}
function setGoal(btn, val) {
  document.getElementById('goal-row').querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active-goal'));
  btn.classList.add('active-goal');
  selectedGoal = val;
}

function calcTargets(weight, height, age, gender, activity) {
  let bmr = gender === 'male'
    ? 10*weight + 6.25*height - 5*age + 5
    : 10*weight + 6.25*height - 5*age - 161;
  let tdee = Math.round(bmr * activity);
  let targetCal = tdee;
  let proteinMult = 1.8;
  if (selectedGoal==='muscle'){targetCal=tdee+300;proteinMult=2.0;}
  if (selectedGoal==='loss'){targetCal=tdee-500;proteinMult=2.2;}
  return { bmr: Math.round(bmr), tdee, targetCal, protein: Math.round(weight*proteinMult) };
}

async function callGroq(messages, maxTokens=2000) {
  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${GROQ_API_KEY}`
    },
    body: JSON.stringify({
      model: GROQ_MODEL,
      max_tokens: maxTokens,
      temperature: 0.7,
      messages
    })
  });
  if (!res.ok) throw new Error(`Groq API error: ${res.status}`);
  const data = await res.json();
  return data.choices[0].message.content;
}

async function generatePlan() {
  const age = +document.getElementById('age').value;
  const weight = +document.getElementById('weight').value;
  const height = +document.getElementById('height').value;
  const gender = document.getElementById('gender').value;
  const activity = +document.getElementById('activity').value;

  if (!age || !weight || !height) { alert('Please fill all fields.'); return; }

  const targets = calcTargets(weight, height, age, gender, activity);
  clientStats = { age, weight, height, gender, activity, diet: selectedDiet, goal: selectedGoal, ...targets };

  document.getElementById('t-cal').textContent = targets.targetCal;
  document.getElementById('t-protein').textContent = targets.protein + 'g';
  document.getElementById('t-bmr').textContent = targets.bmr;

  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Generating your plan...';

  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollIntoView({behavior:'smooth'});

  const badge = selectedDiet==='veg'
    ? '<span class="badge badge-veg">Vegetarian</span>'
    : '<span class="badge badge-nonveg">Non-Veg</span>';
  document.getElementById('plan-title').innerHTML = '7-Day Meal Plan ' + badge + '<span class="ai-badge">✨ AI Generated</span>';

  document.getElementById('day-tabs').innerHTML = '';
  document.getElementById('meal-plan').innerHTML = `<div class="loading-box"><div class="spinner"></div><br>Generating your personalized 7-day plan...<br><small style="color:#888">This takes about 10-15 seconds</small></div>`;

  try {
    const goalLabel = selectedGoal==='muscle'?'Muscle Gain':selectedGoal==='loss'?'Weight Loss':'Maintenance';
    const dietLabel = selectedDiet==='veg'?'Vegetarian (no meat/fish, eggs allowed)':'Non-Vegetarian (includes chicken, fish, eggs)';

    const prompt = `You are an expert Indian diet planner. Create a personalized 7-day Indian meal plan.

CLIENT PROFILE:
- Age: ${age} years, Gender: ${gender}
- Weight: ${weight}kg, Height: ${height}cm
- Goal: ${goalLabel}
- Diet: ${dietLabel}
- Daily calorie target: ${targets.targetCal} kcal
- Daily protein target: ${targets.protein}g

RULES:
- Use realistic Indian foods only (rotis, dal, sabji, rice, paneer max 50g per serving, eggs, chicken, fish etc.)
- Never combine milk and curd in the same meal
- Max 5 almonds per serving
- 5 meals per day: Breakfast, Mid-Morning, Lunch, Evening Snack, Dinner
- Each meal item must have realistic protein(g) and calories(kcal)
- Vary the meals across 7 days — no repetition of exact same day
- Keep portions realistic and healthy

Return ONLY a valid JSON array with this exact structure, no explanation:
[
  {
    "day": "Monday",
    "meals": [
      {
        "name": "Breakfast",
        "color": "#fff8e1",
        "headerColor": "#f57f17",
        "items": [
          {"food": "3 boiled eggs", "protein": 18, "calories": 210},
          {"food": "2 besan chillas", "protein": 10, "calories": 240}
        ]
      },
      {
        "name": "Mid-Morning",
        "color": "#fce4ec",
        "headerColor": "#c62828",
        "items": [...]
      },
      {
        "name": "Lunch",
        "color": "#e8f5e9",
        "headerColor": "#2e7d32",
        "items": [...]
      },
      {
        "name": "Evening Snack",
        "color": "#e3f2fd",
        "headerColor": "#1565c0",
        "items": [...]
      },
      {
        "name": "Dinner",
        "color": "#ede7f6",
        "headerColor": "#6a1b9a",
        "items": [...]
      }
    ]
  }
]
Generate all 7 days (Monday through Sunday). Return only the JSON array.`;

    const raw = await callGroq([{role:'user', content: prompt}], 4000);

    // Parse JSON from response
    let jsonStr = raw.trim();
    const match = jsonStr.match(/\[[\s\S]*\]/);
    if (!match) throw new Error('Could not parse meal plan from AI response');
    generatedPlan = JSON.parse(match[0]);

    currentDay = 0;
    const tabs = document.getElementById('day-tabs');
    tabs.innerHTML = DAYS.map((d,i) => `<button class="day-tab${i===0?' active':''}" onclick="switchDay(${i},this)">${d}</button>`).join('');
    renderDay(0);

  } catch(err) {
    document.getElementById('meal-plan').innerHTML = `<div class="error-box">⚠️ Failed to generate plan: ${err.message}<br><br>Check your API key or try again.</div>`;
  }

  btn.disabled = false;
  btn.textContent = '✨ Regenerate Plan';
}

function switchDay(idx, btn) {
  currentDay = idx;
  document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderDay(idx);
}

function renderDay(idx) {
  const dayData = generatedPlan[idx];
  if (!dayData) return;
  let html = '';
  let dayTotalP = 0, dayTotalK = 0;

  dayData.meals.forEach((meal, mi) => {
    const tp = meal.items.reduce((s,i) => s + (i.protein||0), 0);
    const tk = meal.items.reduce((s,i) => s + (i.calories||0), 0);
    dayTotalP += tp; dayTotalK += tk;
    html += `<div class="meal-section">
      <div class="meal-header" style="background:${meal.color};color:${meal.headerColor}">
        <span>${meal.name}</span>
        <span>${tp}g protein &middot; ${tk} kcal</span>
      </div>
      <div class="meal-body" id="meal-body-${idx}-${mi}">
        ${meal.items.map((item, ii) => `
          <div class="meal-row" id="row-${idx}-${mi}-${ii}">
            <span class="food-name">${item.food}</span>
            <span class="macro">${item.protein}g &middot; ${item.calories} cal</span>
            <button class="swap-btn" onclick="swapItem(${idx},${mi},${ii},this)" title="Suggest a swap">⇄ Swap</button>
          </div>`).join('')}
      </div>
    </div>`;
  });

  html += `<div class="day-total">
    <span>${dayTotalP}g <small>protein today</small></span>
    <span>${dayTotalK} <small>kcal today</small></span>
  </div>`;
  document.getElementById('meal-plan').innerHTML = html;
}

async function swapItem(dayIdx, mealIdx, itemIdx, btn) {
  const item = generatedPlan[dayIdx].meals[mealIdx].items[itemIdx];
  const mealName = generatedPlan[dayIdx].meals[mealIdx].name;
  btn.disabled = true;
  btn.textContent = '...';

  try {
    const prompt = `You are an Indian diet expert. Suggest ONE alternative food swap.

Current item: "${item.food}" (${item.protein}g protein, ${item.calories} kcal) — in ${mealName}
Client diet: ${clientStats.diet === 'veg' ? 'Vegetarian' : 'Non-Vegetarian'}
Client goal: ${clientStats.goal}

Give ONE swap that:
- Is a common Indian food
- Has similar or better protein
- Fits the meal time (${mealName})
- Never combines milk and curd together
- Max 50g paneer if paneer is suggested

Reply in this exact format only:
SWAP: [food name and quantity] | [protein]g protein | [calories] kcal
REASON: [one short sentence why]`;

    const raw = await callGroq([{role:'user', content: prompt}], 200);

    const swapMatch = raw.match(/SWAP:\s*(.+?)\s*\|\s*(\d+)g protein\s*\|\s*(\d+)\s*kcal/i);
    const reasonMatch = raw.match(/REASON:\s*(.+)/i);

    const rowEl = document.getElementById(`row-${dayIdx}-${mealIdx}-${itemIdx}`);
    if (swapMatch) {
      const swapFood = swapMatch[1].trim();
      const swapP = parseInt(swapMatch[2]);
      const swapK = parseInt(swapMatch[3]);
      const reason = reasonMatch ? reasonMatch[1].trim() : '';

      // Insert swap suggestion below the row
      const existing = document.getElementById(`swap-${dayIdx}-${mealIdx}-${itemIdx}`);
      if (existing) existing.remove();
      const div = document.createElement('div');
      div.className = 'swap-result';
      div.id = `swap-${dayIdx}-${mealIdx}-${itemIdx}`;
      div.innerHTML = `⇄ <strong>${swapFood}</strong> — ${swapP}g protein · ${swapK} kcal${reason ? `<br><span style="color:#555;font-size:11px">${reason}</span>` : ''}
        <button onclick="applySwap(${dayIdx},${mealIdx},${itemIdx},'${swapFood.replace(/'/g,"\\'")}',${swapP},${swapK})" style="margin-left:8px;font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid #2d6a4f;background:#2d6a4f;color:white;cursor:pointer;">Apply</button>
        <button onclick="document.getElementById('swap-${dayIdx}-${mealIdx}-${itemIdx}').remove()" style="margin-left:4px;font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid #aaa;background:white;color:#555;cursor:pointer;">Dismiss</button>`;
      rowEl.insertAdjacentElement('afterend', div);
    } else {
      alert('Could not parse swap suggestion. Try again.');
    }
  } catch(err) {
    alert('Swap failed: ' + err.message);
  }
  btn.disabled = false;
  btn.textContent = '⇄ Swap';
}

function applySwap(dayIdx, mealIdx, itemIdx, food, protein, calories) {
  generatedPlan[dayIdx].meals[mealIdx].items[itemIdx] = { food, protein, calories };
  renderDay(dayIdx);
}
</script>
</body>
</html>
