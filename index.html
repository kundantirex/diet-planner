<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indian Diet Planner</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #f5f5f0; color: #222; }
header { background: #2d6a4f; color: white; padding: 1.5rem 2rem; }
header h1 { font-size: 1.6rem; font-weight: 600; }
header p { font-size: 0.9rem; opacity: 0.8; margin-top: 4px; }
.container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
.card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid #e0e0d8; }
.card h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; color: #2d6a4f; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
input, select { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
.toggle-row { display: flex; gap: 10px; margin-top: 4px; }
.toggle-btn { flex: 1; padding: 10px; border: 1.5px solid #ddd; border-radius: 8px; background: white; cursor: pointer; font-size: 13px; font-weight: 500; color: #444; transition: all .15s; }
.toggle-btn.active-veg { border-color: #2d6a4f; background: #d8f3dc; color: #2d6a4f; }
.toggle-btn.active-nonveg { border-color: #b5451b; background: #fde8e0; color: #b5451b; }
.toggle-btn.active-goal { border-color: #2d6a4f; background: #d8f3dc; color: #2d6a4f; }
.btn-calc { width: 100%; padding: 12px; background: #2d6a4f; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 1rem; }
.btn-calc:hover { background: #1b4332; }
.targets { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
.target-box { text-align: center; padding: 1rem; border-radius: 10px; background: #f0faf4; border: 1px solid #b7e4c7; }
.target-box .val { font-size: 1.6rem; font-weight: 700; color: #1b4332; }
.target-box .lbl { font-size: 12px; color: #555; margin-top: 2px; }
.day-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.2rem; }
.day-tab { padding: 6px 14px; border-radius: 20px; border: 1.5px solid #ddd; background: white; cursor: pointer; font-size: 13px; font-weight: 500; color: #555; transition: all .15s; }
.day-tab.active { background: #2d6a4f; color: white; border-color: #2d6a4f; }
.meal-section { margin-bottom: 1.1rem; }
.meal-header { display: flex; justify-content: space-between; align-items: center; padding: .6rem .9rem; border-radius: 8px 8px 0 0; font-weight: 600; font-size: 14px; }
.meal-body { border: 1px solid #e8e8e0; border-top: none; border-radius: 0 0 8px 8px; }
.meal-row { display: flex; justify-content: space-between; font-size: 13px; padding: 7px 12px; border-bottom: 1px solid #f0f0ec; color: #333; }
.meal-row:last-child { border-bottom: none; }
.meal-row .macro { color: #888; font-size: 12px; white-space: nowrap; }
.day-total { display: flex; justify-content: center; gap: 2rem; padding: .9rem; background: #f8faf8; border-radius: 10px; border: 1px solid #d0eada; margin-top: .5rem; }
.day-total span { font-size: 14px; font-weight: 600; color: #1b4332; }
.day-total small { font-size: 12px; color: #666; font-weight: 400; }
#results { display: none; }
.badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; margin-left: 6px; vertical-align: middle; }
.badge-veg { background: #d8f3dc; color: #2d6a4f; }
.badge-nonveg { background: #fde8e0; color: #b5451b; }
</style>
</head>
<body>
<header>
  <h1>Indian Diet Planner</h1>
  <p>Personalized 7-day Indian meal plans — veg & non-veg — based on your goal</p>
</header>
<div class="container">
  <div class="card">
    <h2>Client Details</h2>
    <div class="grid">
      <div>
        <label>Age (years)</label>
        <input type="number" id="age" placeholder="25" min="15" max="80">
      </div>
      <div>
        <label>Gender</label>
        <select id="gender">
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </div>
      <div>
        <label>Weight (kg)</label>
        <input type="number" id="weight" placeholder="70" min="30" max="200">
      </div>
      <div>
        <label>Height (cm)</label>
        <input type="number" id="height" placeholder="175" min="100" max="250">
      </div>
    </div>
    <div style="margin-top:1rem">
      <label>Activity Level</label>
      <select id="activity">
        <option value="1.2">Sedentary (desk job, no gym)</option>
        <option value="1.375">Lightly active (gym 1-3x/week)</option>
        <option value="1.55" selected>Moderately active (gym 4-5x/week)</option>
        <option value="1.725">Very active (hard training daily)</option>
      </select>
    </div>
    <div style="margin-top:1rem">
      <label>Diet Type</label>
      <div class="toggle-row">
        <button class="toggle-btn active-veg" onclick="setDiet(this,'veg')">🥦 Vegetarian</button>
        <button class="toggle-btn" onclick="setDiet(this,'nonveg')">🍗 Non-Vegetarian</button>
      </div>
      <input type="hidden" id="diet" value="veg">
    </div>
    <div style="margin-top:1rem">
      <label>Goal</label>
      <div class="toggle-row">
        <button class="toggle-btn active-goal" onclick="setGoal(this,'muscle')">💪 Muscle Gain</button>
        <button class="toggle-btn" onclick="setGoal(this,'loss')">🔥 Weight Loss</button>
        <button class="toggle-btn" onclick="setGoal(this,'maintain')">⚖️ Maintain</button>
      </div>
      <input type="hidden" id="goal" value="muscle">
    </div>
    <button class="btn-calc" onclick="calculate()">Generate 7-Day Diet Plan</button>
  </div>

  <div id="results">
    <div class="card">
      <h2>Daily Targets</h2>
      <div class="targets">
        <div class="target-box"><div class="val" id="t-cal">--</div><div class="lbl">kcal / day</div></div>
        <div class="target-box"><div class="val" id="t-protein">--</div><div class="lbl">g protein / day</div></div>
        <div class="target-box"><div class="val" id="t-bmr">--</div><div class="lbl">BMR (kcal)</div></div>
      </div>
    </div>
    <div class="card">
      <h2 id="plan-title">7-Day Meal Plan</h2>
      <div class="day-tabs" id="day-tabs"></div>
      <div id="meal-plan"></div>
    </div>
  </div>
</div>

function setDiet(btn, val) {
  document.querySelectorAll('.toggle-row')[0].querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active-veg','active-nonveg'));
  btn.classList.add(val === 'veg' ? 'active-veg' : 'active-nonveg');
  selectedDiet = val;
}
function setGoal(btn, val) {
  document.querySelectorAll('.toggle-row')[1].querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active-goal'));
  btn.classList.add('active-goal');
  selectedGoal = val;
}

const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

function calculate() {
  const age = +document.getElementById('age').value;
  const weight = +document.getElementById('weight').value;
  const height = +document.getElementById('height').value;
  const gender = document.getElementById('gender').value;
  const activity = +document.getElementById('activity').value;
  if (!age || !weight || !height) { alert('Please fill all fields.'); return; }

  let bmr = gender === 'male'
    ? 10*weight + 6.25*height - 5*age + 5
    : 10*weight + 6.25*height - 5*age - 161;
  let tdee = Math.round(bmr * activity);
  let targetCal = tdee;
  let proteinMult = 1.8;
  if (selectedGoal==='muscle'){targetCal=tdee+300;proteinMult=2.0;}
  if (selectedGoal==='loss'){targetCal=tdee-500;proteinMult=2.2;}
  const protein = Math.round(weight * proteinMult);

  document.getElementById('t-cal').textContent = targetCal;
  document.getElementById('t-protein').textContent = protein+'g';
  document.getElementById('t-bmr').textContent = Math.round(bmr);

  const dietData = selectedDiet==='veg' ? VEG : NONVEG;
  generatedPlan = dietData[selectedGoal];
  currentDay = 0;

  const badge = selectedDiet==='veg'
    ? '<span class="badge badge-veg">Vegetarian</span>'
    : '<span class="badge badge-nonveg">Non-Veg</span>';
  document.getElementById('plan-title').innerHTML = '7-Day Meal Plan '+badge;

  const tabs = document.getElementById('day-tabs');
  tabs.innerHTML = DAYS.map((d,i)=>`<button class="day-tab${i===0?' active':''}" onclick="switchDay(${i},this)">${d}</button>`).join('');

  renderDay(0);
  document.getElementById('results').style.display='block';
  document.getElementById('results').scrollIntoView({behavior:'smooth'});
}

function switchDay(idx, btn) {
  currentDay = idx;
  document.querySelectorAll('.day-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderDay(idx);
}

function renderDay(idx) {
  const dayData = generatedPlan[idx];
  let html = '';
  let dayTotalP = 0, dayTotalK = 0;
  dayData.meals.forEach(meal => {
    const tp = meal.items.reduce((s,i)=>s+i.p,0);
    const tk = meal.items.reduce((s,i)=>s+i.k,0);
    dayTotalP += tp; dayTotalK += tk;
    html += `<div class="meal-section">
      <div class="meal-header" style="background:${meal.c};color:${meal.h}">
        <span>${meal.n}</span>
        <span>${tp}g protein &middot; ${tk} kcal</span>
      </div>
      <div class="meal-body">
        ${meal.items.map(i=>`<div class="meal-row"><span>${i.f}</span><span class="macro">${i.p}g &middot; ${i.k} cal</span></div>`).join('')}
      </div>
    </div>`;
  });
  html += `<div class="day-total">
    <span>${dayTotalP}g <small>protein today</small></span>
    <span>${dayTotalK} <small>kcal today</small></span>
  </div>`;
  document.getElementById('meal-plan').innerHTML = html;
}
